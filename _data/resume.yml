projects:
  - title: Periodic Table SME
    stack: Python, FastAPI, LangGraph, Gemini, Qwen, ChromaDB, Elasticsearch
    summary: Multi-agent RAG system for chemistry Q&A, quiz/report generation, and document export.
    bullets:
      - Built ingestion, chunking, embeddings, retrieval, reranking, streaming APIs, and persistent chat memory.
      - Enabled tool-driven outputs such as PDF/PPT generation and email delivery through one agent workflow.
  - title: Tabular Question Answering System (Databench)
    stack: Python, SQLite3, PyTorch, Transformers, PEFT
    summary: Pipeline that converts CSV files to SQL tables for structured data querying and retrieval.
    bullets:
      - Fine-tuned transformer models on SPIDER for SQL generation and automated answer extraction.
      - Improved accuracy by about 8% over the previous architecture.
  - title: Analyzing Language Acquisition in Language Models
    stack: Python, PyTorch, Transformers, scikit-learn, spaCy
    summary: Simulated early language acquisition using BabyBERTa and age-graded child-directed speech datasets.
    bullets:
      - Evaluated syntactic and semantic learning with standardized benchmarks and linguistic analysis tools.
      - Explored parallels between human developmental language learning and machine learning.
  - title: Network File System
    stack: C, POSIX, Sockets, Concurrency
    summary: Client-server file system with naming and storage servers, replication, redundancy, and fail-safe monitoring.
    bullets:
      - Used POSIX threads for concurrency and continuous monitoring of dead servers.
      - Added dynamic port allocation and both TCP and UDP connectivity through WebSockets.

