publications:
  - title: "KTCR: Knowledge Transfer using Concept Refinement"
    venue: International Joint Conference on Neural Networks (IJCNN), 2025
    status: Published
    summary: Published research implementing student-teacher framework for hate speech detection on implicit datasets.
    impact: Achieved nearly 10% improvement in F1 and AUC scores on Wiki Hate, EA and CH datasets using knowledge transfer techniques.
    url: "https://arxiv.org/abs/2410.15314"
  - title: "Freeze and Reveal: Exposing Modality Bias in Vision-Language Models"
    venue: OMMM 2025 Workshop, co-located with RANLP 2025
    status: Accepted
    summary: Developed novel de-biasing technique utilizing Data Augmentation with reduced sample requirements.
    impact: Analyzed which modalities out of text and vision in VLMs contribute more towards gender bias.
    url: "https://arxiv.org/abs/2508.07432"
  - title: "NEAT: Concept driven Neuron Attribution in LLMs"
    venue: SurgeLLM Workshop at ACL 2026
    status: Under review
    summary: Developed a framework to attribute neurons that are responsible for broader human like concepts.
    impact: Decreased the forward passes required from degree 2 polynomial to a linear polynomial.
    url: "https://arxiv.org/abs/2508.15875"
  - title: "Think²: Grounded Metacognitive Reasoning in Large Language Models"
    venue: CoNLL 2026
    status: Under review
    summary: Metacognitive prompting greatly improves LLM error detection and self-correction (~3×).
    impact: Humans prefer it (84%) for better trust and transparency.
    url: "https://arxiv.org/abs/2602.18806"

