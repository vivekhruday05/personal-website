projects:
  - title: Periodic Table SME
    stack: Python, FastAPI, LangGraph, Gemini, Qwen, ChromaDB, Elasticsearch
    summary: Multi-agent RAG system for chemistry Q&A, quiz/report generation, and document export.
    bullets:
      - Built a multi-agent RAG system (Gemini/Qwen) for chemistry Q&A, quiz/report generation, and document export.
      - Implemented full pipeline: ingestion, chunking, embeddings, retrieval, reranking, streaming APIs, and persistent chat memory.
      - Enabled tool-driven outputs including PDF/PPT generation and email delivery via a unified agent workflow.
  - title: Analyzing Language Acquisition in Language Models
    stack: Python, PyTorch, Transformers, scikit-learn, spaCy
    summary: Simulated early language acquisition by training BabyBERTa on age-graded child-directed speech datasets.
    bullets:
      - Simulated early language acquisition by training BabyBERTa on age-graded child-directed speech datasets.
      - Evaluated syntactic and semantic learning using standardized benchmarks and linguistic analysis tools.
      - Analyzed parallels between human developmental language learning and machine learning processes.
  - title: Tabular Question Answering System (Databench)
    stack: Python, SQLite3, PyTorch, Transformers, PEFT
    summary: Architecture converting CSV datasets to SQL format for efficient querying and data access.
    bullets:
      - Developed architecture converting CSV datasets to SQL format for efficient querying and data access.
      - Implemented model using SPIDER dataset for SQL query generation and automated answer extraction.
      - Achieved improved performance on tabular question answering benchmarks using fine-tuned language models.
  - title: Network File System
    stack: C, POSIX, Sockets, Concurrency
    summary: Distributed network file system with naming server, storage servers, and client architecture.
    bullets:
      - Developed distributed network file system with naming server, storage servers, and client architecture.
      - Implemented concurrent multi-device support and multiple client handling using POSIX threading.
      - Designed fault-tolerant system with load balancing and data replication capabilities.
  - title: C-Shell Implementation
    stack: C, Operating Systems, Linux, POSIX
    summary: Custom Unix shell replicating core command-line interface functionalities and system calls.
    bullets:
      - Built custom Unix shell replicating core command-line interface functionalities and system calls.
      - Implemented advanced features including process piping, I/O redirection, job control, and signal handling.
      - Developed robust error handling and memory management for system-level programming.
  - title: Modified XV6-RISC-V Operating System
    stack: C, Operating Systems, RISC-V, Data Structures
    summary: Enhanced MIT's XV6 operating system with custom system calls and scheduling algorithms.
    bullets:
      - Enhanced MIT's XV6 operating system by implementing custom system calls and process scheduling algorithms.
      - Developed FCFS, Priority-based Scheduling (PBS), and Multi-Level Feedback Queue (MLFQ) schedulers.
      - Demonstrated expertise in low-level system programming and operating system kernel development.
  - title: BallotTrack Election Database System
    stack: SQL, Python, PyMySQL
    summary: Election management database with role-based access control and transaction management.
    bullets:
      - Designed comprehensive election management database with role-based access control for admin and users.
      - Implemented data integrity constraints, transaction management, and efficient query optimization.
      - Developed user interface for data entry, reporting, and election result analysis.
  - title: Image Compression using Linear Algebra
    stack: MATLAB, DCT, SVD
    summary: Image compression using Discrete Cosine Transform and Singular Value Decomposition.
    bullets:
      - Implemented and compared Discrete Cosine Transform (DCT) and Singular Value Decomposition (SVD) compression techniques.
      - Analyzed compression ratios and image quality metrics for different mathematical approaches.
      - Provided theoretical analysis and empirical results in comprehensive technical report.

